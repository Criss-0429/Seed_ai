name: Release

# IMPORTANT — read before relying on this workflow.
#
# The full SEED release CANNOT be built on GitHub-hosted runners: the installer
# bundles local-only ML checkpoints (emotion/wav2vec2, embeddings, privacy
# filter) that are not available in CI and must not be committed to Git.
#
# Therefore the actual build + asset upload is a LOCAL / SELF-HOSTED step:
#
#   1. On a Windows machine with the checkpoints present, build the release:
#        python scripts\build_release.py --version X.Y.Z --schema-version 1
#        & "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe" /DAppVersion=X.Y.Z `
#            /DReleaseRoot="$PWD\release\X.Y.Z" installer\SEED.iss
#        python scripts\build_release.py --version X.Y.Z --finalize-installer
#   2. Upload assets to the tag's GitHub Release (manual, or self-hosted runner):
#        gh release upload vX.Y.Z `
#            release\X.Y.Z\SEED-Bootstrap-Setup-Unsigned.exe `
#            release\X.Y.Z\SEED-runtime-X.Y.Z.zip `
#            release\X.Y.Z\release-manifest.json `
#            release\X.Y.Z\SHA256SUMS.txt `
#            installer\TESTER_GUIDE.md
#
# This hosted workflow only PREPARES the release shell (a draft) and validates
# the tag. It never builds or fabricates installer binaries.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to prepare a draft release for (e.g. v0.3.0-pilot)"
        required: true

permissions:
  contents: write

jobs:
  prepare-draft:
    name: Prepare draft GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # storia + tag completi (serve a merge-base)

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR: nessun tag. Su dispatch manuale inserisci il tag (es. v0.3.1-pilot)."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Preparing draft release for: $TAG"

      # Ancestry control SOLO quando il tag esiste davvero (push di tag).
      # Su dispatch manuale il tag puo' non esistere ancora: la draft lo ancora a main.
      - name: Validate pushed tag points to main history
        if: github.event_name == 'push'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          TAG_SHA="$(git rev-parse "$TAG^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "ERROR: $TAG non e' raggiungibile da origin/main."
            exit 1
          fi

      - name: Create or update DRAFT release (no assets)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          NOTES=$(cat <<EOF
          SEED $TAG — pilot tester build.

          **Installer non firmato.** Windows SmartScreen può apparire: è previsto.
          Verifica l'hash con \`Get-FileHash\` prima di eseguire.

          ### Asset attesi (caricati localmente / da runner self-hosted)
          - SEED-Bootstrap-Setup-Unsigned.exe
          - SEED-<version>-runtime-update.zip
          - SEED-<version>-supervisor.zip
          - release-manifest.json
          - SHA256SUMS.txt
          - TESTER_GUIDE.md
          - Reset-SEED-Keep-Memory.ps1

          > Questa draft è stata creata dalla CI. Gli asset NON vengono costruiti
          > su runner GitHub: aggiungili dalla macchina di build, poi pubblica.
          EOF
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — leaving as-is (assets managed locally)."
          else
            # --target ancora la release a main: la draft si crea anche se il tag
            # non esiste ancora (il tag verra' creato alla pubblicazione).
            gh release create "$TAG" \
              --draft \
              --target "${{ github.sha }}" \
              --title "SEED $TAG" \
              --notes "$NOTES"
            echo "Draft release $TAG created. Upload assets locally, then publish."
          fi

      - name: Reminder — assets are uploaded out-of-band
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "::notice::Draft prepared. Build on a machine with ML checkpoints,"
          echo "::notice::then 'gh release upload $TAG ...' and publish the release."
