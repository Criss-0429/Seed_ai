name: Deploy site to GitHub Pages

# Publishes the static distribution site in site/ to GitHub Pages.
# The site links to GitHub Releases for downloads — it ships no binaries.

on:
  push:
    branches: [Website]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Upload site artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — no binaries in site/
        run: |
          matches=$(find site -type f \( -iname '*.exe' -o -iname '*.zip' \
            -o -iname '*.7z' -o -iname '*.msi' \) || true)
          if [ -n "$matches" ]; then
            echo "ERROR: binaries in site/ — downloads must use Releases:"; echo "$matches"; exit 1
          fi
          echo "ok: site/ ships no binaries"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
